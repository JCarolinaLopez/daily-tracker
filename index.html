<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Daily Tracker</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#c97b5a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daily Tracker">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  :root {
    --bg: #f3e9da;
    --panel: #fffaf2;
    --panel-2: #f6ecdc;
    --line: #e4d3bd;
    --text: #4a3b30;
    --muted: #a08c76;
    --accent: #c97b5a;
    --accent-2: #e0a872;
    --green: #7f9b6a;
    --red: #c25b4e;
    --streak: #d96020;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(160deg, #f6ecdc 0%, #f0e0cb 100%);
    background-attachment: fixed;
    color: var(--text);
    line-height: 1.5;
  }

  header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  header h1 { margin: 0; font-size: 1.3rem; letter-spacing: .3px; }
  .today-pill {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px 14px;
    font-size: .85rem; font-weight: 600; color: var(--muted);
  }
  .today-pill.all-done { background: #edf5e8; border-color: #b8d9a8; color: #4a7a38; }

  .month-nav { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .month-nav button {
    background: var(--panel-2); border: 1px solid var(--line); color: var(--text);
    width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 1.1rem;
  }
  .month-nav button:hover { background: var(--line); }
  .month-nav .label { font-size: .95rem; font-weight: 600; min-width: 130px; text-align: center; }

  main { max-width: 680px; margin: 0 auto; padding: 20px 16px 80px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(74,59,48,.06);
  }
  .card h2 { margin: 0 0 14px; font-size: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }

  /* ---- Combined calendar ---- */
  .legend { display: flex; flex-wrap: wrap; gap: 10px 18px; margin-bottom: 14px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: .85rem; font-weight: 600; color: var(--text); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-header { text-align: center; font-size: .68rem; color: var(--muted); font-weight: 600; padding: 2px 0 6px; }
  .cal-day {
    border-radius: 8px;
    padding: 4px 2px 5px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    min-height: 44px;
    background: var(--panel-2);
    border: 1px solid transparent;
  }
  .cal-day.today { border-color: var(--accent); background: #fdf4ef; }
  .cal-day.future { opacity: .35; }
  .cal-empty { min-height: 44px; }
  .cal-num {
    font-size: .72rem; font-weight: 700; color: var(--text);
    line-height: 1;
  }
  .cal-day.today .cal-num { color: var(--accent); }
  .cal-day.future .cal-num { color: var(--muted); }
  .cal-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; }
  .cdot {
    width: 7px; height: 7px; border-radius: 50%;
    flex-shrink: 0;
  }
  .cdot.done { /* color via inline style */ }
  .cdot.missed { background: transparent; border: 1.5px solid var(--line); }

  /* ---- Task cards ---- */
  .task-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; margin-bottom: 16px; }
  .task-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    box-shadow: 0 2px 8px rgba(74,59,48,.06);
  }
  .task-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .task-color-bar { width: 4px; height: 20px; border-radius: 999px; flex-shrink: 0; }
  .task-name-edit {
    flex: 1; min-width: 80px;
    background: transparent; border: none; border-bottom: 1.5px solid transparent;
    color: var(--text); padding: 2px 4px;
    font-size: 1rem; font-weight: 700; font-family: inherit;
  }
  .task-name-edit:hover { border-bottom-color: var(--line); }
  .task-name-edit:focus { outline: none; border-bottom-color: var(--accent); background: var(--panel-2); border-radius: 4px; }
  .streak-badge {
    display: flex; align-items: center; gap: 4px;
    border-radius: 999px; padding: 3px 10px;
    font-size: .8rem; font-weight: 700; white-space: nowrap; flex-shrink: 0;
    background: #fff3e8; border: 1px solid #f5c89a; color: var(--streak);
  }
  .streak-badge.zero { background: var(--panel-2); border-color: var(--line); color: var(--muted); font-weight: 500; }
  button.icon {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 1rem; padding: 3px 6px; border-radius: 6px; flex-shrink: 0;
  }
  button.icon:hover { background: #fdf0ef; color: var(--red); }

  .checkin { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .btn-done {
    border: none; padding: 9px 16px; border-radius: 10px;
    font-size: .9rem; font-weight: 700; cursor: pointer; font-family: inherit;
    display: flex; align-items: center; gap: 6px;
    transition: filter .15s, transform .12s;
    color: #fffaf2; flex-shrink: 0;
  }
  .btn-done:hover { filter: brightness(1.1); }
  .btn-done:active { transform: scale(.97); }
  .btn-done.is-done {
    background: var(--panel-2) !important;
    color: var(--text);
    border: 1.5px solid var(--line);
  }
  .note-input {
    flex: 1; min-width: 100px;
    background: var(--bg); border: 1px solid var(--line);
    color: var(--text); padding: 8px 11px;
    border-radius: 10px; font-size: .88rem; font-family: inherit;
  }
  .note-input:focus { outline: none; border-color: var(--accent); }
  .done-note { font-size: .82rem; color: var(--muted); font-style: italic; }

  /* ---- Add task ---- */
  .add-card { border: 2px dashed var(--line); background: transparent; box-shadow: none; }
  .add-card:hover { border-color: var(--accent-2); }
  .add-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .add-input {
    flex: 1; min-width: 140px;
    background: var(--panel-2); border: 1px solid var(--line);
    color: var(--text); padding: 9px 12px;
    border-radius: 10px; font-size: .95rem; font-family: inherit;
  }
  .add-input:focus { outline: none; border-color: var(--accent); }
  button.primary {
    background: var(--accent); color: #fffaf2; border: none;
    padding: 10px 20px; border-radius: 10px;
    font-size: .95rem; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  button.primary:hover { filter: brightness(1.08); }
  button.ghost {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line); padding: 7px 13px;
    border-radius: 9px; cursor: pointer; font-size: .82rem; font-family: inherit;
  }
  button.ghost:hover { background: var(--line); }

  footer { text-align: center; color: var(--muted); font-size: .8rem; padding: 20px; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>🌿 Daily Tracker</h1>
    <div class="today-pill" id="todayPill">— / —</div>
  </div>
  <div class="month-nav">
    <button id="prevMonth" aria-label="Previous month">‹</button>
    <span class="label" id="monthLabel"></span>
    <button id="nextMonth" aria-label="Next month">›</button>
  </div>
</header>

<main>
  <!-- Combined calendar -->
  <div class="card" id="calCard">
    <h2>This month</h2>
    <div class="legend" id="calLegend"></div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- Task check-in cards -->
  <div class="task-grid" id="taskList"></div>

  <!-- Add task -->
  <div class="card add-card">
    <div class="add-row">
      <input type="text" class="add-input" id="newTaskName" placeholder="Add a new task…" maxlength="60">
      <button class="primary" id="addTaskBtn">Add</button>
    </div>
  </div>
</main>

<footer>
  Data lives in your browser only. &nbsp;·&nbsp;
  <button class="ghost" id="exportBtn">Export</button>
  <button class="ghost" id="importBtn">Import</button>
  <input type="file" id="importFile" accept="application/json,.json" style="display:none">
  <button class="ghost" id="resetBtn" style="color:var(--red)">Reset</button>
</footer>

<script>
"use strict";

const STORAGE_KEY = "dailyTracker.v1";
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DOW = ["S","M","T","W","T","F","S"];
const TASK_COLORS = ["#c97b5a","#7f9b6a","#6b8cba","#c4944a","#9b6bba","#5aa8a8"];

/* ---------- State ---------- */
function defaultState() {
  return {
    version: 1,
    tasks: [
      { id: "t1", name: "Paper 1" },
      { id: "t2", name: "Paper 2" },
      { id: "t3", name: "Paper 3" }
    ],
    logs: []
  };
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const s = Object.assign(defaultState(), JSON.parse(raw));
    if (!Array.isArray(s.tasks)) s.tasks = [];
    if (!Array.isArray(s.logs)) s.logs = [];
    return s;
  } catch(e) { return defaultState(); }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
let state = loadState();

/* ---------- Date helpers ---------- */
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function ymOf(iso) { return iso.slice(0,7); }
function ymLabel(ym) {
  const [y,m] = ym.split("-").map(Number);
  return `${MONTH_NAMES[m-1]} ${y}`;
}
function shiftYm(ym, delta) {
  let [y,m] = ym.split("-").map(Number);
  m += delta;
  while (m < 1) { m += 12; y--; }
  while (m > 12) { m -= 12; y++; }
  return `${y}-${String(m).padStart(2,"0")}`;
}
function daysInMonth(ym) {
  const [y,m] = ym.split("-").map(Number);
  return new Date(y, m, 0).getDate();
}
function offsetDate(iso, days) {
  const [y,m,d] = iso.split("-").map(Number);
  const date = new Date(y, m-1, d + days);
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
}

let currentYm = ymOf(todayISO());

/* ---------- Logic ---------- */
function taskColor(idx) { return TASK_COLORS[idx % TASK_COLORS.length]; }
function logFor(taskId, date) { return state.logs.find(l => l.taskId === taskId && l.date === date) || null; }
function streakFor(taskId) {
  const today = todayISO();
  const logDates = new Set(state.logs.filter(l => l.taskId === taskId).map(l => l.date));
  const doneToday = logDates.has(today);
  let streak = 0, i = doneToday ? 0 : 1;
  while (i <= 3650) {
    if (logDates.has(offsetDate(today, -i))) { streak++; i++; } else break;
  }
  return { streak, doneToday };
}
function todayProgress() {
  const today = todayISO();
  const done = state.tasks.filter(t => state.logs.some(l => l.taskId === t.id && l.date === today)).length;
  return { done, total: state.tasks.length };
}

/* ---------- Rendering ---------- */
function render() {
  document.getElementById("monthLabel").textContent = ymLabel(currentYm);
  renderTodayPill();
  renderCalendar();
  renderTasks();
}

function renderTodayPill() {
  const { done, total } = todayProgress();
  const pill = document.getElementById("todayPill");
  if (total === 0) { pill.textContent = "No tasks yet"; pill.className = "today-pill"; return; }
  pill.textContent = done === total ? `${done} / ${total} ✓ all done!` : `${done} / ${total} done today`;
  pill.className = "today-pill" + (done === total ? " all-done" : "");
}

function renderCalendar() {
  // Legend
  document.getElementById("calLegend").innerHTML = state.tasks.map((t, i) =>
    `<div class="legend-item">
      <span class="legend-dot" style="background:${taskColor(i)}"></span>
      ${escHtml(t.name)}
    </div>`
  ).join("");

  // Grid
  const today = todayISO();
  const [yr, mo] = currentYm.split("-").map(Number);
  const firstDow = new Date(yr, mo-1, 1).getDay();
  const dim = daysInMonth(currentYm);

  // Build a log lookup: date -> Set of taskIds done
  const doneMap = {};
  state.logs.forEach(l => {
    if (ymOf(l.date) === currentYm) {
      if (!doneMap[l.date]) doneMap[l.date] = new Set();
      doneMap[l.date].add(l.taskId);
    }
  });

  let html = DOW.map(l => `<div class="cal-header">${l}</div>`).join("");

  for (let i = 0; i < firstDow; i++) html += `<div class="cal-empty"></div>`;

  for (let d = 1; d <= dim; d++) {
    const ds = `${currentYm}-${String(d).padStart(2,"0")}`;
    const isToday = ds === today;
    const isFuture = ds > today;
    let cls = "cal-day";
    if (isToday) cls += " today";
    else if (isFuture) cls += " future";

    let dots = "";
    if (!isFuture) {
      const doneTasks = doneMap[ds] || new Set();
      dots = state.tasks.map((t, i) => {
        const done = doneTasks.has(t.id);
        return `<span class="cdot ${done ? "done" : "missed"}" ${done ? `style="background:${taskColor(i)}"` : ""}></span>`;
      }).join("");
    }

    html += `<div class="${cls}">
      <span class="cal-num">${d}</span>
      ${!isFuture ? `<div class="cal-dots">${dots}</div>` : ""}
    </div>`;
  }

  document.getElementById("calGrid").innerHTML = html;
}

function renderTasks() {
  const box = document.getElementById("taskList");
  if (!state.tasks.length) {
    box.innerHTML = `<div class="task-card" style="text-align:center;color:var(--muted)">No tasks yet — add one below.</div>`;
    return;
  }
  const today = todayISO();
  box.innerHTML = state.tasks.map((task, i) => {
    const color = taskColor(i);
    const { streak, doneToday } = streakFor(task.id);
    const log = logFor(task.id, today);

    const streakHtml = streak > 0
      ? `<div class="streak-badge">🔥 ${streak}d</div>`
      : `<div class="streak-badge zero">no streak</div>`;

    const checkinHtml = doneToday
      ? `<div class="checkin">
          <button class="btn-done is-done" data-undone="${task.id}">✓ Done</button>
          ${log && log.note ? `<span class="done-note">"${escHtml(log.note)}"</span>` : ""}
         </div>`
      : `<div class="checkin">
          <button class="btn-done" data-done="${task.id}" style="background:${color}">Mark done</button>
          <input type="text" class="note-input" id="note-${task.id}" placeholder="Quick note…" maxlength="120">
         </div>`;

    return `
      <div class="task-card" data-taskcard="${task.id}">
        <div class="task-head">
          <div class="task-color-bar" style="background:${color}"></div>
          <input type="text" class="task-name-edit" value="${escHtml(task.name)}"
                 data-rename="${task.id}" maxlength="60" aria-label="Task name">
          ${streakHtml}
          <button class="icon" data-taskdel="${task.id}" title="Delete" aria-label="Delete task">🗑</button>
        </div>
        ${checkinHtml}
      </div>`;
  }).join("");
}

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* ---------- Events ---------- */
document.getElementById("prevMonth").addEventListener("click", () => { currentYm = shiftYm(currentYm, -1); render(); });
document.getElementById("nextMonth").addEventListener("click", () => { currentYm = shiftYm(currentYm, 1); render(); });

document.getElementById("taskList").addEventListener("click", e => {
  const doneId   = e.target.getAttribute("data-done");
  const undoneId = e.target.getAttribute("data-undone");
  const delId    = e.target.getAttribute("data-taskdel");
  if (doneId) {
    const note = (document.getElementById(`note-${doneId}`) || {}).value || "";
    state.logs = state.logs.filter(l => !(l.taskId === doneId && l.date === todayISO()));
    state.logs.push({ id: crypto.randomUUID(), taskId: doneId, date: todayISO(), note: note.trim() });
    saveState(); render(); return;
  }
  if (undoneId) {
    state.logs = state.logs.filter(l => !(l.taskId === undoneId && l.date === todayISO()));
    saveState(); render(); return;
  }
  if (delId) {
    const task = state.tasks.find(t => t.id === delId);
    if (!task || !confirm(`Delete "${task.name}"? All its history will be removed.`)) return;
    state.tasks = state.tasks.filter(t => t.id !== delId);
    state.logs  = state.logs.filter(l => l.taskId !== delId);
    saveState(); render(); return;
  }
});

// Enter in note field = mark done
document.getElementById("taskList").addEventListener("keydown", e => {
  if (e.key !== "Enter" || !e.target.id || !e.target.id.startsWith("note-")) return;
  e.preventDefault();
  const btn = document.querySelector(`[data-done="${e.target.id.replace("note-","")}"]`);
  if (btn) btn.click();
});

// Rename on change
document.getElementById("taskList").addEventListener("change", e => {
  const renameId = e.target.getAttribute("data-rename");
  if (!renameId) return;
  const task = state.tasks.find(t => t.id === renameId);
  if (!task) return;
  const newName = e.target.value.trim();
  if (!newName) { e.target.value = task.name; return; }
  task.name = newName;
  saveState(); render();
});

document.getElementById("addTaskBtn").addEventListener("click", () => {
  const name = document.getElementById("newTaskName").value.trim();
  if (!name) { document.getElementById("newTaskName").focus(); return; }
  state.tasks.push({ id: crypto.randomUUID(), name });
  saveState();
  document.getElementById("newTaskName").value = "";
  render();
});
document.getElementById("newTaskName").addEventListener("keydown", e => {
  if (e.key === "Enter") { e.preventDefault(); document.getElementById("addTaskBtn").click(); }
});

document.getElementById("exportBtn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `daily-tracker-${todayISO()}.json`; a.click();
  URL.revokeObjectURL(url);
});
document.getElementById("importBtn").addEventListener("click", () => document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change", e => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!Array.isArray(data.tasks)) throw new Error("Invalid file.");
      if (!confirm(`Import? This has ${data.tasks.length} task(s) and will replace your current data.`)) return;
      state = Object.assign(defaultState(), data);
      saveState(); currentYm = ymOf(todayISO()); render();
      alert("Imported ✅");
    } catch(err) { alert("Could not import: " + err.message); }
    finally { e.target.value = ""; }
  };
  reader.readAsText(file);
});
document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("Delete ALL data and start fresh?")) {
    state = defaultState(); saveState(); currentYm = ymOf(todayISO()); render();
  }
});

/* ---------- Go ---------- */
render();
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(() => {}); });
}
</script>
</body>
</html>
