<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Daily Tracker</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#c97b5a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daily Tracker">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  :root {
    --bg: #f3e9da;
    --panel: #fffaf2;
    --panel-2: #f6ecdc;
    --line: #e4d3bd;
    --text: #4a3b30;
    --muted: #a08c76;
    --accent: #c97b5a;
    --accent-2: #e0a872;
    --green: #7f9b6a;
    --red: #c25b4e;
    --streak: #d96020;
    --ice: #5580aa;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(160deg, #f6ecdc 0%, #f0e0cb 100%);
    background-attachment: fixed;
    color: var(--text); line-height: 1.5;
  }

  header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  header h1 { margin: 0; font-size: 1.3rem; letter-spacing: .3px; }
  .today-pill {
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 999px; padding: 4px 14px;
    font-size: .85rem; font-weight: 600; color: var(--muted);
  }
  .today-pill.all-done { background: #edf5e8; border-color: #b8d9a8; color: #4a7a38; }
  .month-nav { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .month-nav button {
    background: var(--panel-2); border: 1px solid var(--line); color: var(--text);
    width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 1.1rem;
  }
  .month-nav button:hover { background: var(--line); }
  .month-nav .label { font-size: .95rem; font-weight: 600; min-width: 130px; text-align: center; }

  main { max-width: 680px; margin: 0 auto; padding: 20px 16px 80px; }

  /* ---- Banner ---- */
  .banner {
    border-radius: 12px; padding: 12px 16px; margin-bottom: 16px;
    font-size: .9rem; display: flex; align-items: flex-start; gap: 10px;
    background: #fff3e8; border: 1px solid #f5c89a; color: var(--text);
  }
  .banner.urgent { background: #fdf0ef; border-color: #f0b8b4; }
  .banner-ico { font-size: 1.2rem; flex-shrink: 0; line-height: 1.4; }

  /* ---- Cards ---- */
  .card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 16px; padding: 20px; margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(74,59,48,.06);
  }
  .card h2 { margin: 0 0 14px; font-size: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }

  /* ---- Combined calendar ---- */
  .legend { display: flex; flex-wrap: wrap; gap: 10px 18px; margin-bottom: 14px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: .85rem; font-weight: 600; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-header { text-align: center; font-size: .68rem; color: var(--muted); font-weight: 600; padding: 2px 0 6px; }
  .cal-day {
    border-radius: 8px; padding: 4px 2px 5px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    min-height: 44px; background: var(--panel-2); border: 1px solid transparent;
  }
  .cal-day.today { border-color: var(--accent); background: #fdf4ef; }
  .cal-day.future { opacity: .35; }
  .cal-empty { min-height: 44px; }
  .cal-num { font-size: .72rem; font-weight: 700; color: var(--text); line-height: 1; }
  .cal-day.today .cal-num { color: var(--accent); }
  .cal-day.future .cal-num { color: var(--muted); }
  .cal-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; }
  .cdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .cdot.missed { background: transparent; border: 1.5px solid var(--line); }
  .cdot.frozen { background: #6b9fd4; }

  /* ---- Task cards ---- */
  .task-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; margin-bottom: 16px; }
  .task-card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; padding: 16px;
    box-shadow: 0 2px 8px rgba(74,59,48,.06);
  }
  .task-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .task-color-bar { width: 4px; height: 20px; border-radius: 999px; flex-shrink: 0; }
  .task-name-edit {
    flex: 1; min-width: 80px;
    background: transparent; border: none; border-bottom: 1.5px solid transparent;
    color: var(--text); padding: 2px 4px;
    font-size: 1rem; font-weight: 700; font-family: inherit;
  }
  .task-name-edit:hover { border-bottom-color: var(--line); }
  .task-name-edit:focus { outline: none; border-bottom-color: var(--accent); background: var(--panel-2); border-radius: 4px; }

  .badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .badge {
    display: flex; align-items: center; gap: 4px;
    border-radius: 999px; padding: 3px 10px;
    font-size: .78rem; font-weight: 700; white-space: nowrap; flex-shrink: 0;
  }
  .badge-streak { background: #fff3e8; border: 1px solid #f5c89a; color: var(--streak); }
  .badge-streak.zero { background: var(--panel-2); border-color: var(--line); color: var(--muted); font-weight: 500; }
  .badge-best { background: #f8f2e4; border: 1px solid #e8d9be; color: #8a6e30; }
  .badge-week { background: var(--panel-2); border: 1px solid var(--line); color: var(--muted); }
  .badge-week.full { background: #edf5e8; border-color: #b8d9a8; color: #4a7a38; }

  button.icon {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 1rem; padding: 3px 6px; border-radius: 6px; flex-shrink: 0;
  }
  button.icon:hover { background: #fdf0ef; color: var(--red); }

  .checkin { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
  .btn-done {
    border: none; padding: 9px 16px; border-radius: 10px;
    font-size: .9rem; font-weight: 700; cursor: pointer; font-family: inherit;
    display: flex; align-items: center; gap: 6px;
    transition: filter .15s, transform .12s; color: #fffaf2; flex-shrink: 0;
  }
  .btn-done:hover { filter: brightness(1.1); }
  .btn-done:active { transform: scale(.97); }
  .btn-done.is-done { background: var(--panel-2) !important; color: var(--text); border: 1.5px solid var(--line); }
  .note-input {
    flex: 1; min-width: 100px;
    background: var(--bg); border: 1px solid var(--line);
    color: var(--text); padding: 8px 11px;
    border-radius: 10px; font-size: .88rem; font-family: inherit;
  }
  .note-input:focus { outline: none; border-color: var(--accent); }
  .done-note { font-size: .82rem; color: var(--muted); font-style: italic; }

  .freeze-btn {
    background: #eef4fb; border: 1px solid #b8d0ea; color: var(--ice);
    padding: 7px 14px; border-radius: 10px;
    font-size: .85rem; font-weight: 600; cursor: pointer; font-family: inherit;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .freeze-btn:hover { background: #dceaf5; }
  .freeze-used { font-size: .82rem; color: var(--muted); padding: 4px 0; }

  /* ---- Complete task button ---- */
  .complete-btn {
    width: 100%; margin-top: 10px; padding: 8px;
    background: transparent; border: 1px dashed var(--line);
    color: var(--muted); border-radius: 10px;
    font-size: .82rem; cursor: pointer; font-family: inherit;
    transition: background .15s, color .15s, border-color .15s;
  }
  .complete-btn:hover { background: #edf5e8; border-color: #b8d9a8; color: #4a7a38; }

  /* ---- Completed section ---- */
  .completed-section { margin-top: 8px; }
  .completed-section h2 {
    font-size: .82rem; color: var(--muted); text-transform: uppercase;
    letter-spacing: .5px; font-weight: 600; margin: 0 0 10px; padding: 0 4px;
  }
  .completed-item {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    opacity: .75;
  }
  .completed-item:hover { opacity: 1; }
  .completed-name { font-weight: 700; flex: 1; min-width: 100px; text-decoration: line-through; color: var(--muted); }
  .completed-stats { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .completed-stat { font-size: .8rem; color: var(--muted); background: var(--panel-2); border: 1px solid var(--line); border-radius: 999px; padding: 2px 10px; }
  .restore-btn {
    background: var(--panel-2); border: 1px solid var(--line);
    color: var(--muted); padding: 5px 12px; border-radius: 8px;
    font-size: .8rem; cursor: pointer; font-family: inherit; flex-shrink: 0;
  }
  .restore-btn:hover { background: var(--line); color: var(--text); }

  /* ---- Add task ---- */
  .add-card { border: 2px dashed var(--line); background: transparent; box-shadow: none; }
  .add-card:hover { border-color: var(--accent-2); }
  .add-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .add-input {
    flex: 1; min-width: 140px;
    background: var(--panel-2); border: 1px solid var(--line);
    color: var(--text); padding: 9px 12px;
    border-radius: 10px; font-size: .95rem; font-family: inherit;
  }
  .add-input:focus { outline: none; border-color: var(--accent); }
  button.primary {
    background: var(--accent); color: #fffaf2; border: none;
    padding: 10px 20px; border-radius: 10px;
    font-size: .95rem; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  button.primary:hover { filter: brightness(1.08); }
  button.ghost {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line); padding: 7px 13px;
    border-radius: 9px; cursor: pointer; font-size: .82rem; font-family: inherit;
  }
  button.ghost:hover { background: var(--line); }

  footer { text-align: center; color: var(--muted); font-size: .8rem; padding: 20px; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>🌿 Daily Tracker</h1>
    <div class="today-pill" id="todayPill">— / —</div>
  </div>
  <div class="month-nav">
    <button id="prevMonth" aria-label="Previous month">‹</button>
    <span class="label" id="monthLabel"></span>
    <button id="nextMonth" aria-label="Next month">›</button>
  </div>
</header>

<main>
  <!-- Banner: shows when some tasks not done today -->
  <div class="banner" id="todayBanner" style="display:none">
    <span class="banner-ico" id="bannerIco">🌿</span>
    <span id="bannerText"></span>
  </div>

  <!-- Combined calendar -->
  <div class="card" id="calCard">
    <h2>This month</h2>
    <div class="legend" id="calLegend"></div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- Task check-in cards -->
  <div class="task-grid" id="taskList"></div>

  <!-- Completed tasks -->
  <div class="completed-section" id="completedSection" style="display:none"></div>

  <!-- Add task -->
  <div class="card add-card">
    <div class="add-row">
      <input type="text" class="add-input" id="newTaskName" placeholder="Add a new task…" maxlength="60">
      <button class="primary" id="addTaskBtn">Add</button>
    </div>
  </div>
</main>

<footer>
  Data lives in your browser only. &nbsp;·&nbsp;
  <button class="ghost" id="exportBtn">Export</button>
  <button class="ghost" id="importBtn">Import</button>
  <input type="file" id="importFile" accept="application/json,.json" style="display:none">
  <button class="ghost" id="resetBtn" style="color:var(--red)">Reset</button>
</footer>

<script>
"use strict";

const STORAGE_KEY = "dailyTracker.v1";
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DOW = ["S","M","T","W","T","F","S"];
const TASK_COLORS = ["#c97b5a","#7f9b6a","#6b8cba","#c4944a","#9b6bba","#5aa8a8"];

/* ---------- State ---------- */
function defaultState() {
  return {
    version: 1,
    tasks: [
      { id: "t1", name: "Paper 1" },
      { id: "t2", name: "Paper 2" },
      { id: "t3", name: "Paper 3" }
    ],
    logs: [],      // { id, taskId, date, note }
    freezes: []    // { id, taskId, date }
  };
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const s = Object.assign(defaultState(), JSON.parse(raw));
    if (!Array.isArray(s.tasks))   s.tasks   = [];
    if (!Array.isArray(s.logs))    s.logs    = [];
    if (!Array.isArray(s.freezes)) s.freezes = [];
    s.tasks.forEach(t => { if (!('completedAt' in t)) t.completedAt = null; });
    return s;
  } catch(e) { return defaultState(); }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
let state = loadState();

/* ---------- Date helpers ---------- */
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function ymOf(iso) { return iso.slice(0,7); }
function ymLabel(ym) {
  const [y,m] = ym.split("-").map(Number);
  return `${MONTH_NAMES[m-1]} ${y}`;
}
function shiftYm(ym, delta) {
  let [y,m] = ym.split("-").map(Number);
  m += delta;
  while (m < 1) { m += 12; y--; }
  while (m > 12) { m -= 12; y++; }
  return `${y}-${String(m).padStart(2,"0")}`;
}
function daysInMonth(ym) {
  const [y,m] = ym.split("-").map(Number);
  return new Date(y, m, 0).getDate();
}
function offsetDate(iso, days) {
  const [y,m,d] = iso.split("-").map(Number);
  const date = new Date(y, m-1, d + days);
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
}
// Monday of the week containing iso
function weekStart(iso) {
  const [y,m,d] = iso.split("-").map(Number);
  const date = new Date(y, m-1, d);
  const dow = date.getDay(); // 0=Sun
  date.setDate(date.getDate() - (dow === 0 ? 6 : dow - 1));
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
}

let currentYm = ymOf(todayISO());

/* ---------- Logic ---------- */
function taskColor(idx) { return TASK_COLORS[idx % TASK_COLORS.length]; }
function logFor(taskId, date) { return state.logs.find(l => l.taskId === taskId && l.date === date) || null; }
function isFrozen(taskId, date) { return state.freezes.some(f => f.taskId === taskId && f.date === date); }
function isDoneOrFrozen(taskId, date) {
  return state.logs.some(l => l.taskId === taskId && l.date === date) || isFrozen(taskId, date);
}

function streakFor(taskId) {
  const today = todayISO();
  const doneToday = isDoneOrFrozen(taskId, today);
  let streak = 0, i = doneToday ? 0 : 1;
  while (i <= 3650) {
    if (isDoneOrFrozen(taskId, offsetDate(today, -i))) { streak++; i++; } else break;
  }
  return { streak, doneToday };
}

function personalBest(taskId) {
  const logDates = state.logs.filter(l => l.taskId === taskId).map(l => l.date);
  const freezeDates = state.freezes.filter(f => f.taskId === taskId).map(f => f.date);
  const all = [...new Set([...logDates, ...freezeDates])].sort();
  if (all.length === 0) return 0;
  let best = 1, cur = 1;
  for (let i = 1; i < all.length; i++) {
    const diff = Math.round((new Date(all[i]) - new Date(all[i-1])) / 86400000);
    if (diff === 1) { cur++; if (cur > best) best = cur; }
    else cur = 1;
  }
  return best;
}

function weeklyConsistency(taskId) {
  const today = todayISO();
  const ws = weekStart(today);
  let done = 0, elapsed = 0;
  for (let i = 0; i < 7; i++) {
    const d = offsetDate(ws, i);
    if (d > today) break;
    elapsed++;
    if (isDoneOrFrozen(taskId, d)) done++;
  }
  return { done, elapsed };
}

function freezesThisWeek(taskId) {
  const ws = weekStart(todayISO());
  return state.freezes.filter(f => f.taskId === taskId && weekStart(f.date) === ws).length;
}

function totalDaysFor(taskId) {
  return new Set(state.logs.filter(l => l.taskId === taskId).map(l => l.date)).size;
}

function todayProgress() {
  const today = todayISO();
  const done = state.tasks.filter(t => isDoneOrFrozen(t.id, today)).length;
  return { done, total: state.tasks.length };
}

/* ---------- Rendering ---------- */
function render() {
  document.getElementById("monthLabel").textContent = ymLabel(currentYm);
  renderTodayPill();
  renderBanner();
  renderCalendar();
  renderTasks();
  renderCompleted();
}

function renderTodayPill() {
  const { done, total } = todayProgress();
  const pill = document.getElementById("todayPill");
  if (total === 0) { pill.textContent = "No tasks yet"; pill.className = "today-pill"; return; }
  pill.textContent = done === total ? `${done} / ${total} ✓ all done!` : `${done} / ${total} done today`;
  pill.className = "today-pill" + (done === total ? " all-done" : "");
}

function renderBanner() {
  const banner = document.getElementById("todayBanner");
  const isToday = currentYm === ymOf(todayISO());
  if (!isToday || !state.tasks.length) { banner.style.display = "none"; return; }

  const missing = state.tasks.filter(t => !isDoneOrFrozen(t.id, todayISO()));
  if (!missing.length) { banner.style.display = "none"; return; }

  const hour = new Date().getHours();
  const urgent = hour >= 20;
  banner.style.display = "flex";
  banner.className = "banner" + (urgent ? " urgent" : "");
  document.getElementById("bannerIco").textContent = urgent ? "🌙" : "🌿";
  document.getElementById("bannerText").innerHTML = urgent
    ? `<b>Almost midnight!</b> Still time to check in: ${missing.map(t => escHtml(t.name)).join(", ")}`
    : `Don't break the chain! Still need today: <b>${missing.map(t => escHtml(t.name)).join(", ")}</b>`;
}

function renderCalendar() {
  document.getElementById("calLegend").innerHTML = state.tasks.map((t, i) =>
    `<div class="legend-item">
      <span class="legend-dot" style="background:${taskColor(i)}"></span>
      ${escHtml(t.name)}
    </div>`
  ).join("");

  const today = todayISO();
  const [yr, mo] = currentYm.split("-").map(Number);
  const firstDow = new Date(yr, mo-1, 1).getDay();
  const dim = daysInMonth(currentYm);

  let html = DOW.map(l => `<div class="cal-header">${l}</div>`).join("");
  for (let i = 0; i < firstDow; i++) html += `<div class="cal-empty"></div>`;

  for (let d = 1; d <= dim; d++) {
    const ds = `${currentYm}-${String(d).padStart(2,"0")}`;
    const isToday = ds === today;
    const isFuture = ds > today;
    let cls = "cal-day";
    if (isToday) cls += " today";
    else if (isFuture) cls += " future";

    let dots = "";
    if (!isFuture) {
      dots = state.tasks.map((t, i) => {
        const done = state.logs.some(l => l.taskId === t.id && l.date === ds);
        const frozen = isFrozen(t.id, ds);
        if (done) return `<span class="cdot" style="background:${taskColor(i)}"></span>`;
        if (frozen) return `<span class="cdot frozen"></span>`;
        return `<span class="cdot missed"></span>`;
      }).join("");
    }

    html += `<div class="${cls}">
      <span class="cal-num">${d}</span>
      ${!isFuture ? `<div class="cal-dots">${dots}</div>` : ""}
    </div>`;
  }
  document.getElementById("calGrid").innerHTML = html;
}

function renderTasks() {
  const box = document.getElementById("taskList");
  if (!state.tasks.length) {
    box.innerHTML = `<div class="task-card" style="text-align:center;color:var(--muted)">No tasks yet — add one below.</div>`;
    return;
  }
  const today = todayISO();
  const active = state.tasks.map((t, i) => ({ task: t, i })).filter(({ task }) => !task.completedAt);
  if (!active.length) { box.innerHTML = ""; return; }
  box.innerHTML = active.map(({ task, i }) => {
    const color = taskColor(i);
    const { streak, doneToday } = streakFor(task.id);
    const best = personalBest(task.id);
    const { done: wDone, elapsed: wElapsed } = weeklyConsistency(task.id);
    const log = logFor(task.id, today);
    const frozen = isFrozen(task.id, today);
    const canFreeze = !doneToday && streak > 0 && freezesThisWeek(task.id) === 0;
    const usedFreeze = freezesThisWeek(task.id) > 0 && !doneToday;

    const streakBadge = streak > 0
      ? `<span class="badge badge-streak">🔥 ${streak}d</span>`
      : `<span class="badge badge-streak zero">no streak</span>`;

    const bestBadge = best > 0
      ? `<span class="badge badge-best">🏆 ${best}d best</span>`
      : "";

    const weekFull = wDone === wElapsed && wElapsed > 0;
    const weekBadge = `<span class="badge badge-week${weekFull ? " full" : ""}">📅 ${wDone}/${wElapsed} wk</span>`;

    let checkinHtml;
    if (frozen) {
      checkinHtml = `<div class="checkin"><button class="btn-done is-done" data-undofreeze="${task.id}">🧊 Frozen today</button></div>`;
    } else if (doneToday) {
      checkinHtml = `<div class="checkin">
        <button class="btn-done is-done" data-undone="${task.id}">✓ Done</button>
        ${log && log.note ? `<span class="done-note">"${escHtml(log.note)}"</span>` : ""}
      </div>`;
    } else {
      checkinHtml = `<div class="checkin">
        <button class="btn-done" data-done="${task.id}" style="background:${color}">Mark done</button>
        <input type="text" class="note-input" id="note-${task.id}" placeholder="Quick note…" maxlength="120">
      </div>`;
    }

    let freezeHtml = "";
    if (canFreeze) {
      freezeHtml = `<button class="freeze-btn" data-freeze="${task.id}">🧊 Use streak freeze <span style="opacity:.65;font-weight:400;font-size:.78rem">(1 left this week)</span></button>`;
    } else if (usedFreeze) {
      freezeHtml = `<div class="freeze-used">🧊 Freeze used this week — no more until Monday.</div>`;
    }

    return `
      <div class="task-card" data-taskcard="${task.id}">
        <div class="task-head">
          <div class="task-color-bar" style="background:${color}"></div>
          <input type="text" class="task-name-edit" value="${escHtml(task.name)}"
                 data-rename="${task.id}" maxlength="60" aria-label="Task name">
          <button class="icon" data-taskdel="${task.id}" title="Delete" aria-label="Delete task">🗑</button>
        </div>
        <div class="badges" style="margin-bottom:10px">${streakBadge}${bestBadge}${weekBadge}</div>
        ${checkinHtml}
        ${freezeHtml}
        <button class="complete-btn" data-complete="${task.id}">🏁 Mark this task as finished</button>
      </div>`;
  }).join("");
}

function renderCompleted() {
  const section = document.getElementById("completedSection");
  const done = state.tasks.filter(t => t.completedAt);
  if (!done.length) { section.style.display = "none"; return; }
  section.style.display = "block";
  section.innerHTML = `<h2>🏁 Completed (${done.length})</h2>` +
    done.map(task => {
      const i = state.tasks.indexOf(task);
      const color = taskColor(i);
      const best = personalBest(task.id);
      const total = totalDaysFor(task.id);
      return `
        <div class="completed-item">
          <div class="task-color-bar" style="background:${color};height:16px"></div>
          <span class="completed-name">${escHtml(task.name)}</span>
          <div class="completed-stats">
            <span class="completed-stat">📅 ${total} day${total===1?"":"s"} worked</span>
            <span class="completed-stat">🏆 ${best}d best streak</span>
            <span class="completed-stat">✓ ${task.completedAt}</span>
          </div>
          <button class="restore-btn" data-restore="${task.id}">Restore</button>
        </div>`;
    }).join("");
}

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* ---------- Events ---------- */
document.getElementById("prevMonth").addEventListener("click", () => { currentYm = shiftYm(currentYm, -1); render(); });
document.getElementById("nextMonth").addEventListener("click", () => { currentYm = shiftYm(currentYm, 1); render(); });

document.getElementById("taskList").addEventListener("click", e => {
  const doneId       = e.target.getAttribute("data-done");
  const undoneId     = e.target.getAttribute("data-undone");
  const delId        = e.target.getAttribute("data-taskdel");
  const freezeId     = e.target.getAttribute("data-freeze");
  const undofreezeId = e.target.getAttribute("data-undofreeze");
  const completeId   = e.target.getAttribute("data-complete");

  if (doneId) {
    const note = (document.getElementById(`note-${doneId}`) || {}).value || "";
    state.logs = state.logs.filter(l => !(l.taskId === doneId && l.date === todayISO()));
    state.logs.push({ id: crypto.randomUUID(), taskId: doneId, date: todayISO(), note: note.trim() });
    saveState(); render(); return;
  }
  if (undoneId) {
    state.logs = state.logs.filter(l => !(l.taskId === undoneId && l.date === todayISO()));
    saveState(); render(); return;
  }
  if (freezeId) {
    state.freezes.push({ id: crypto.randomUUID(), taskId: freezeId, date: todayISO() });
    saveState(); render(); return;
  }
  if (undofreezeId) {
    state.freezes = state.freezes.filter(f => !(f.taskId === undofreezeId && f.date === todayISO()));
    saveState(); render(); return;
  }
  if (completeId) {
    const task = state.tasks.find(t => t.id === completeId);
    if (!task || !confirm(`Mark "${task.name}" as finished? It'll move to the Completed section. You can restore it anytime.`)) return;
    task.completedAt = todayISO();
    saveState(); render(); return;
  }
  if (delId) {
    const task = state.tasks.find(t => t.id === delId);
    if (!task || !confirm(`Delete "${task.name}"? All its history will be removed.`)) return;
    state.tasks   = state.tasks.filter(t => t.id !== delId);
    state.logs    = state.logs.filter(l => l.taskId !== delId);
    state.freezes = state.freezes.filter(f => f.taskId !== delId);
    saveState(); render(); return;
  }
});

// Restore completed task (delegated on completedSection)
document.getElementById("completedSection").addEventListener("click", e => {
  const restoreId = e.target.getAttribute("data-restore");
  if (!restoreId) return;
  const task = state.tasks.find(t => t.id === restoreId);
  if (!task) return;
  task.completedAt = null;
  saveState(); render();
});

// Enter in note field = mark done
document.getElementById("taskList").addEventListener("keydown", e => {
  if (e.key !== "Enter" || !e.target.id || !e.target.id.startsWith("note-")) return;
  e.preventDefault();
  const btn = document.querySelector(`[data-done="${e.target.id.replace("note-","")}"]`);
  if (btn) btn.click();
});

// Rename on change
document.getElementById("taskList").addEventListener("change", e => {
  const renameId = e.target.getAttribute("data-rename");
  if (!renameId) return;
  const task = state.tasks.find(t => t.id === renameId);
  if (!task) return;
  const newName = e.target.value.trim();
  if (!newName) { e.target.value = task.name; return; }
  task.name = newName;
  saveState(); render();
});

document.getElementById("addTaskBtn").addEventListener("click", () => {
  const name = document.getElementById("newTaskName").value.trim();
  if (!name) { document.getElementById("newTaskName").focus(); return; }
  state.tasks.push({ id: crypto.randomUUID(), name });
  saveState();
  document.getElementById("newTaskName").value = "";
  render();
});
document.getElementById("newTaskName").addEventListener("keydown", e => {
  if (e.key === "Enter") { e.preventDefault(); document.getElementById("addTaskBtn").click(); }
});

document.getElementById("exportBtn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `daily-tracker-${todayISO()}.json`; a.click();
  URL.revokeObjectURL(url);
});
document.getElementById("importBtn").addEventListener("click", () => document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change", e => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!Array.isArray(data.tasks)) throw new Error("Invalid file.");
      if (!confirm(`Import? This has ${data.tasks.length} task(s) and will replace your current data.`)) return;
      state = Object.assign(defaultState(), data);
      saveState(); currentYm = ymOf(todayISO()); render();
      alert("Imported ✅");
    } catch(err) { alert("Could not import: " + err.message); }
    finally { e.target.value = ""; }
  };
  reader.readAsText(file);
});
document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("Delete ALL data and start fresh?")) {
    state = defaultState(); saveState(); currentYm = ymOf(todayISO()); render();
  }
});

/* ---------- Go ---------- */
render();
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(() => {}); });
}
</script>
</body>
</html>
